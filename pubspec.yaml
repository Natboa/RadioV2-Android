name: radiov2_android
description: "RadioV2 - Internet radio app"
publish_to: 'none'

version: 1.0.6+8

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Database
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24

  # Audio
  just_audio: ^0.9.39
  audio_service: ^0.18.18
  audio_session: ^0.1.21

  # Network / images
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  connectivity_plus: ^6.0.3

  rxdart: ^0.28.0

  # Storage / utils
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  file_picker: ^8.1.4
  package_info_plus: ^8.0.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  drift_dev: ^2.18.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo/RadioV2_Logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo/RadioV2_Logo.png"
  min_sdk_android: 26

flutter:
  uses-material-design: true

  assets:
    - assets/database/stations.db
    - assets/images/logo/empty.png
    - assets/images/logo/RadioV2_Logo.png
    - assets/images/logo/radiov2_Logo_full.png
    - assets/images/groups/
